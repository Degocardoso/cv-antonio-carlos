<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — CV Antônio</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c10;--bg2:#0d1117;--bg3:#111820;--panel:#0e1520;
  --border:#1a2535;--bb:#1e3a5f;
  --neon:#00ff88;--neon2:#00cfff;--neon3:#ff6b35;--neon4:#a855f7;--neon5:#7ec8a0;
  --t:#c9d1d9;--td:#6e7f95;--tb:#e6edf3;
  --mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif;--r:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t);font-family:var(--sans);min-height:100vh;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

/* LOGIN */
.login-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg);}
.login-box{background:var(--bg2);border:1px solid var(--bb);border-radius:10px;padding:44px 40px;display:flex;flex-direction:column;align-items:center;gap:16px;width:min(400px,92vw);box-shadow:0 0 60px rgba(0,255,136,.06);}
.login-logo{font-family:var(--mono);font-size:26px;color:var(--neon);font-weight:700;}
.login-sub{font-family:var(--mono);font-size:11px;color:var(--td);text-align:center;line-height:1.7;}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;color:var(--tb);font-family:var(--mono);font-size:16px;outline:none;text-align:center;letter-spacing:6px;transition:border-color .2s;}
.login-input:focus{border-color:var(--neon);}
.login-err{font-family:var(--mono);font-size:11px;color:#ff6b6b;min-height:16px;text-align:center;}
.login-loading{font-family:var(--mono);font-size:11px;color:var(--neon2);display:flex;align-items:center;gap:6px;}
.spin{width:12px;height:12px;border:1px solid var(--border);border-top-color:var(--neon2);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* BUTTONS */
.btn{padding:10px 20px;border-radius:var(--r);font-family:var(--mono);font-size:12px;cursor:pointer;border:none;transition:all .2s;font-weight:600;}
.btn-g{background:rgba(0,255,136,.15);color:var(--neon);border:1px solid rgba(0,255,136,.3);}
.btn-g:hover{background:rgba(0,255,136,.28);}
.btn-r{background:rgba(255,80,80,.1);color:#ff6b6b;border:1px solid rgba(255,80,80,.2);}
.btn-r:hover{background:rgba(255,80,80,.22);}
.btn-c{background:rgba(0,207,255,.1);color:var(--neon2);border:1px solid rgba(0,207,255,.2);}
.btn-c:hover{background:rgba(0,207,255,.2);}
.btn-big{padding:12px 32px;font-size:13px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* ADMIN LAYOUT */
.aw{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1;}
.aw.open{display:flex;}
.atop{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;gap:12px;flex-wrap:wrap;}
.atitle{font-family:var(--mono);font-size:13px;color:var(--neon);}
.atitle small{color:var(--td);font-size:10px;}
.atop-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.toast{font-family:var(--mono);font-size:11px;color:var(--neon);opacity:0;transition:opacity .3s;white-space:nowrap;max-width:320px;}
.toast.show{opacity:1;}.toast.err{color:#ff6b6b;}
.preview-a{font-family:var(--mono);font-size:11px;color:var(--neon2);text-decoration:none;padding:6px 12px;border:1px solid rgba(0,207,255,.2);border-radius:var(--r);transition:all .2s;}
.preview-a:hover{background:rgba(0,207,255,.1);}
.cloud-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:20px;}
.cloud-badge.ok{background:rgba(0,255,136,.1);color:var(--neon);border:1px solid rgba(0,255,136,.2);}
.cloud-badge.off{background:rgba(110,127,149,.1);color:var(--td);border:1px solid rgba(110,127,149,.2);}
.cloud-badge.err{background:rgba(255,80,80,.1);color:#ff6b6b;border:1px solid rgba(255,80,80,.2);}
.cloud-badge.loading{background:rgba(0,207,255,.08);color:var(--neon2);border:1px solid rgba(0,207,255,.15);}

/* TABS */
.tabs{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{padding:10px 13px;font-family:var(--mono);font-size:11px;color:var(--td);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;user-select:none;}
.tab:hover{color:var(--tb);}.tab.on{color:var(--neon);border-bottom-color:var(--neon);}

/* BODY */
.abody{flex:1;overflow-y:auto;padding:28px 32px;}
@media(max-width:700px){.abody{padding:16px;}}
.sec{display:none;}.sec.on{display:block;}

/* FORM */
.row{margin-bottom:16px;}
.lbl{font-family:var(--mono);font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block;}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;color:var(--tb);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--neon2);}
.inp::placeholder{color:var(--td);}
textarea.inp{resize:vertical;min-height:80px;}
select.inp{cursor:pointer;}
.g2f{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3f{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.g4f{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
@media(max-width:700px){.g2f,.g3f,.g4f{grid-template-columns:1fr;}}
.hint{font-family:var(--mono);font-size:10px;color:var(--td);margin-top:4px;line-height:1.6;}

/* CARDS */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.card:last-child{margin-bottom:0;}
.card-h{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.card-n{font-family:var(--mono);font-size:10px;color:var(--td);background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:2px 7px;}
.card-t{font-size:12px;font-weight:600;color:var(--tb);flex:1;}

/* COLOR DOTS */
.crow{display:flex;align-items:center;gap:8px;margin-top:10px;}
.crow label{font-family:var(--mono);font-size:10px;color:var(--td);}
.cdots{display:flex;gap:6px;}
.cdot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .2s;}
.cdot.on{border-color:white;}
.cdot.g{background:var(--neon);}.cdot.c{background:var(--neon2);}.cdot.o{background:var(--neon3);}.cdot.p{background:var(--neon4);}

/* FEATURED TOGGLE */
.feat-toggle{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-top:10px;cursor:pointer;transition:border-color .2s;}
.feat-toggle.on{border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.06);}
.feat-toggle input{width:16px;height:16px;accent-color:var(--neon);cursor:pointer;flex-shrink:0;}
.feat-toggle span{font-family:var(--mono);font-size:11px;color:var(--td);}
.feat-toggle.on span{color:var(--neon);}

/* IMAGE UPLOAD */
.izone{border:1px dashed var(--bb);border-radius:var(--r);padding:14px;text-align:center;margin-top:10px;transition:border-color .2s;}
.izone:hover{border-color:var(--neon2);}
.izone label{cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--td);}
.ithumb-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.ithumb{position:relative;width:90px;height:56px;}
.ithumb img{width:100%;height:100%;object-fit:cover;border-radius:4px;border:1px solid var(--border);}
.ithumb-del{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:#ff5f57;border:none;color:white;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* SAVE BAR */
.sbar{display:flex;align-items:center;justify-content:flex-end;gap:12px;padding-top:20px;margin-top:20px;border-top:1px solid var(--border);}
.smsg{font-family:var(--mono);font-size:11px;color:var(--neon);opacity:0;transition:opacity .3s;}
.smsg.show{opacity:1;}

.ck-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.ck-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--neon);cursor:pointer;}
.ck-row span{font-family:var(--mono);font-size:12px;color:var(--t);}

/* THEME */
.color-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.color-row .color-lbl{font-family:var(--mono);font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:1px;min-width:100px;}
.color-row input[type=color]{width:44px;height:36px;border:1px solid var(--border);border-radius:var(--r);background:none;cursor:pointer;padding:2px;}
.color-row .hex-inp{width:100px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;color:var(--tb);font-family:var(--mono);font-size:12px;outline:none;}
.color-row .hex-inp:focus{border-color:var(--neon2);}
.color-swatch{width:80px;height:36px;border-radius:var(--r);border:1px solid var(--border);}

::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bb);border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:var(--neon);}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="lw">
  <div class="login-box">
    <div class="login-logo">⚙ Admin</div>

/* ═══ DEFAULTS ═══ */

    {emoji:"🌐",label:"HTML/CSS/JS"},{emoji:"📧",label:"SendGrid"},

  theme:{textColor:'',textDim:'',textBright:''}

/* ═══ STATE ═══ */
let D = JSON.parse(JSON.stringify(DEFAULTS));
let IMGS = {};
let SESSION_PWD = ''; // senha apenas em memória — nunca em arquivo ou localStorage
// Imagens agora são URLs do Cloudinary guardadas em D.projects[i].images[]
// Não há mais localStorage para imagens

/* ═══ MERGE ═══ */
function mergeFromCloud(record) {
  const result = JSON.parse(JSON.stringify(record));
  for (const k of Object.keys(DEFAULTS)) {
    if (result[k] === null || result[k] === undefined) {
      result[k] = JSON.parse(JSON.stringify(DEFAULTS[k]));
    } else if (typeof DEFAULTS[k] === 'object' && !Array.isArray(DEFAULTS[k]) && typeof result[k] === 'object' && !Array.isArray(result[k])) {
      for (const sk of Object.keys(DEFAULTS[k])) {
        if (result[k][sk] === null || result[k][sk] === undefined) result[k][sk] = JSON.parse(JSON.stringify(DEFAULTS[k][sk]));
      }
    }
  }
  return result;
}

/* ═══ LOAD ═══ */
let DATA_SOURCE = 'defaults'; // 'cloud' | 'defaults'

async function loadCloud() {
  setBadge('loading', '☁ Carregando...');
  DATA_SOURCE = 'defaults';
  try {
    const res = await fetch(CV_READ_URL, { cache: 'no-cache' });
    if (res.ok) {
      const record = await res.json();
      if (record && !record.error && Object.keys(record).length > 0) {
        D = mergeFromCloud(record);
        DATA_SOURCE = 'cloud';
        setBadge('ok', '☁ JSONBin carregado');
      } else {
        setBadge('err', record && record.error ? '☁ ' + record.error : '☁ Bin vazio');
      }
    } else {
      setBadge('err', '☁ Erro ' + res.status);
    }
  } catch(e) {
    setBadge('err', '☁ Sem conexão: ' + e.message);
  }
  // Imagens carregadas via Cloudinary URLs em D.projects[i].images
}

/* ═══ SAVE ═══ */
async function saveAll() {
  collectCurrent();
  setBadge('loading', '☁ Salvando...');
  try {
    const res = await fetch(CV_WRITE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': SESSION_PWD },
      body: JSON.stringify(D)
    });
    if (res.ok) { flash('☁ Salvo na nuvem!'); setBadge('ok', '☁ Salvo'); }
    else if (res.status === 401) { flash('❌ Sessão expirada. Faça login novamente.', true); setBadge('err', '☁ Não autorizado'); logout(); }
    else { flash('⚠ Erro ao salvar: ' + res.status, true); setBadge('err', '☁ Erro'); }
  } catch(e) { flash('⚠ Sem conexão.', true); setBadge('err', '☁ Sem conexão'); }
  // Imagens já estão em D.projects[i].images (URLs Cloudinary) — salvas via saveAll normal
}

function setBadge(cls, txt) { const el=document.getElementById('cloudBadge'); if(!el)return; el.className='cloud-badge '+cls; el.textContent=txt; }
function flash(msg, err) { const el=document.getElementById('gToast'); el.textContent=msg; el.className='toast show'+(err?' err':''); setTimeout(()=>el.classList.remove('show'),4500); }

/* ═══ AUTH ═══ */
async function doLogin() {
  const val = document.getElementById('pi').value;
  if (!val) return;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('le');
  btn.disabled = true; btn.textContent = 'Verificando...';
  try {
    const res = await fetch(CV_WRITE_URL, { method:'GET', headers:{'X-Admin-Password': val} });
    if (res.ok) {
      SESSION_PWD = val;
      document.getElementById('lw').style.display = 'none';
      document.getElementById('aw').classList.add('open');
      buildUI();
    } else {
      errEl.textContent = '❌ Senha incorreta.';
      document.getElementById('pi').value = '';
      document.getElementById('pi').focus();
      setTimeout(() => errEl.textContent = '', 2500);
    }
  } catch(e) {
    errEl.textContent = '⚠ Erro de conexão.';
    setTimeout(() => errEl.textContent = '', 3000);
  }

/* ── IMAGE UPLOAD via Cloudinary (through Netlify Function) ── */
async function handleImgs(idx, inp) {
  if (!inp.files.length) return;

  // SESSION_PWD must be set — if page was reloaded after login, it's lost
  if (!SESSION_PWD) {
    const statusEl = document.getElementById('upload-status-' + idx);
    if (statusEl) {
      statusEl.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:#ff6b6b;padding:8px;background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);border-radius:4px;margin-top:8px;">❌ Sessão expirada. Clique em <strong>Sair</strong> e faça login novamente para enviar fotos.</div>';
    }
    flash('❌ Sessão expirada — faça login novamente para enviar fotos.', true);
    inp.value = '';
    return;
  }

  if (!D.projects[idx].images) D.projects[idx].images = [];

  const files = Array.from(inp.files);
  inp.value = '';

  const statusEl = document.getElementById('upload-status-' + idx);
  const total = files.length;
  let done = 0, failed = 0;

  if (statusEl) {
    statusEl.innerHTML = `<div style="font-family:var(--mono);font-size:10px;color:var(--neon2);padding:6px 0;">⏳ Enviando 0/${total}...</div>`;
  }

  for (const file of files) {
    if (file.size > 5 * 1024 * 1024) {
      failed++;
      flash(`⚠ "${file.name}" é maior que 5MB e foi ignorado.`, true);
      continue;
    }

    // Convert to base64
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });

    try {
      const response = await fetch(CV_UPLOAD_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Admin-Password': SESSION_PWD,
        },
        body: JSON.stringify({ file: base64, projectIndex: idx }),
      });

      const result = await response.json();

      if (response.ok && result.url) {
        D.projects[idx].images = D.projects[idx].images || [];
        D.projects[idx].images.push(result.url);
        done++;
        if (statusEl) statusEl.innerHTML = `<div style="font-family:var(--mono);font-size:10px;color:var(--neon2);padding:6px 0;">⏳ Enviando ${done}/${total}...</div>`;
        rThumbs(idx);
      } else if (response.status === 401) {
        failed++;
        if (statusEl) statusEl.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:#ff6b6b;padding:8px;background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);border-radius:4px;margin-top:8px;">❌ Não autorizado (401). ' + (result.hint || 'Faça logout e login novamente.') + '</div>';
        flash('❌ Erro 401: ' + (result.hint || 'Sessão expirada — faça login novamente.'), true);
        break; // No point continuing if auth failed
      } else if (response.status === 500 && result.hint) {
        failed++;
        if (statusEl) statusEl.innerHTML = `<div style="font-family:var(--mono);font-size:11px;color:var(--neon3);padding:8px;background:rgba(255,107,53,.08);border:1px solid rgba(255,107,53,.2);border-radius:4px;margin-top:8px;">⚠ Configuração: ${result.hint}</div>`;
        flash('⚠ ' + result.hint, true);
        break;
      } else {
        failed++;
        flash(`⚠ Erro ao enviar "${file.name}": ${result.error || response.status}`, true);
      }
    } catch(e) {
      failed++;
      flash(`⚠ Falha de conexão ao enviar "${file.name}".`, true);
    }
  }

  // Final status
  if (statusEl) {
    if (failed === 0) {
      statusEl.innerHTML = `<div style="font-family:var(--mono);font-size:10px;color:var(--neon);padding:6px 0;">✓ ${done} foto${done>1?'s':''} enviada${done>1?'s':''} com sucesso! Clique em 💾 Salvar para confirmar.</div>`;
    } else {
      statusEl.innerHTML = `<div style="font-family:var(--mono);font-size:10px;color:var(--neon3);padding:6px 0;">⚠ ${done} ok, ${failed} com erro. Clique em 💾 Salvar para confirmar.</div>`;
    }
  }
}

async function reloadFromCloud(){
  const el=document.getElementById('msg-push');
  if(el){el.textContent='⏳ Recarregando...';el.classList.add('show');}
  await loadCloud();
  buildUI();
  if(el){
    el.textContent = DATA_SOURCE==='cloud' ? '✓ Dados do JSONBin carregados!' : '⚠ JSONBin indisponível.';
    setTimeout(()=>el.classList.remove('show'),3000);
  }
}

function downloadUpdatedDefaults(){
  collectCurrent();
  const dJson = JSON.stringify(D, null, 2);

  // Build the new admin.html by replacing the DEFAULTS block
  // Use a split approach instead of regex to avoid multiline string issues
  const currentHtml = document.documentElement.outerHTML;
  const marker = '/* \u2550\u2550\u2550 STATE \u2550\u2550\u2550 */';
  const defaultsMarker = 'const DEFAULTS =';

  const defStart = currentHtml.indexOf(defaultsMarker);
  const stateStart = currentHtml.indexOf(marker);

  if (defStart === -1 || stateStart === -1) {
    flash('\u26a0 N\u00e3o foi poss\u00edvel localizar o bloco DEFAULTS no HTML.', true);
    return;
  }

  const before = currentHtml.substring(0, defStart);
  const after  = currentHtml.substring(stateStart);
  const newHtml = before + 'const DEFAULTS = ' + dJson + ';\n\n' + after;

  const blob = new Blob([newHtml], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'admin.html';
  a.click();
  URL.revokeObjectURL(url);
  flash('\u2713 admin.html baixado! Suba no GitHub para atualizar o site.');
}
async function resetAll(){
  if(!confirm('Resetar TUDO para padrão? Não pode ser desfeito.'))return;
  D=JSON.parse(JSON.stringify(DEFAULTS));IMGS={};
  await saveAll();buildUI();flash('✓ Resetado!');
}
