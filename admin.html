<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — CV Antônio</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="lw">
  <div class="login-box">
    <div class="login-logo">⚙ Admin</div>
    <div class="login-sub">Painel de edição do CV<br>acesso restrito</div>
    <div class="login-loading" id="loginLoading"><div class="spin"></div> Carregando dados...</div>
    <input type="password" class="login-input" id="pi" placeholder="••••••••"
           style="display:none;" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="le"></div>
    <button class="btn btn-g btn-big" id="loginBtn" onclick="doLogin()" style="display:none;">Entrar</button>
  </div>
</div>

<!-- ADMIN -->
<div class="aw" id="aw">
  <div class="atop">
    <div class="atitle">✏️ Editor do CV <small>ADMIN</small></div>
    <div class="atop-right">
      <span class="cloud-badge loading" id="cloudBadge">☁ Conectando...</span>
      <span class="toast" id="gToast"></span>
      <a class="preview-a" href="index.html" target="_blank">👁 Ver CV</a>
      <button class="btn btn-g" onclick="saveAll()">💾 Salvar Tudo</button>
      <button class="btn" style="background:rgba(255,80,80,.08);color:#ff6b6b;border:1px solid rgba(255,80,80,.15);" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="tabs" id="tabsEl"></div>
  <div class="abody" id="secEl"></div>
</div>

<script type="module">
import { init } from './js/controller/admin-controller.js';
init();
</script>
</body>
</html>
